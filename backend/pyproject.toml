[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
pythonpath = ["."]

[tool.coverage.run]
source = ["app"]
omit = ["*/__pycache__/*", "*/tests/*"]

[tool.black]
line-length = 88
target-version = ["py311"]

[tool.isort]
profile = "black"
